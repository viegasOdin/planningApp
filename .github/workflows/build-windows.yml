name: Build Windows EXE

on:
  push:
    tags:
      - "v*"          # Dispara ao criar uma tag como v1.0.0
  workflow_dispatch:  # Permite rodar manualmente pela UI do GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout do código
      # ----------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Configura Python 3.11
      #    (3.11 tem boa compatibilidade com Streamlit + PyInstaller)
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ----------------------------------------------------------------
      # 3. Instala dependências do projeto + PyInstaller
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pandas plotly sqlalchemy openpyxl pyarrow altair
          pip install pyinstaller

      # ----------------------------------------------------------------
      # 4. Verifica qual versão do Streamlit foi instalada
      #    (útil para debugar problemas de compatibilidade nos logs)
      # ----------------------------------------------------------------
      - name: Show installed versions
        run: |
          pip show streamlit pyinstaller pandas plotly sqlalchemy

      # ----------------------------------------------------------------
      # 5. Executa o PyInstaller com o arquivo .spec
      #
      #    O app.spec já contém todas as configurações necessárias:
      #      - collect_data_files("streamlit") → copia CSS/JS/meta
      #      - hiddenimports → módulos carregados dinamicamente
      #      - datas → arquivos .py do projeto copiados para _MEIPASS
      #      - onedir (--collect) → mais estável que onefile com Streamlit
      # ----------------------------------------------------------------
      - name: Build with PyInstaller
        run: |
          pyinstaller app.spec --noconfirm --clean

      # ----------------------------------------------------------------
      # 6. Comprime a pasta de saída (dist/GerenciadorProjetos/)
      #    em um arquivo .zip para facilitar o download
      # ----------------------------------------------------------------
      - name: Zip output
        run: |
          Compress-Archive -Path dist\GerenciadorProjetos\* `
            -DestinationPath dist\GerenciadorProjetos-Windows.zip
        shell: pwsh

      # ----------------------------------------------------------------
      # 7. Publica o .zip como artefato do workflow
      #    Disponível por 30 dias na aba "Actions" do repositório
      # ----------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GerenciadorProjetos-Windows
          path: dist\GerenciadorProjetos-Windows.zip
          retention-days: 30

      # ----------------------------------------------------------------
      # (Opcional) 8. Cria uma Release no GitHub ao fazer push de tag
      #    Remove o bloco abaixo se não quiser Releases automáticas
      # ----------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist\GerenciadorProjetos-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
